<h1>MemeBrain</h1>

<p>Current folder: {{ folder_path }}</p>

<form method="POST">
    <label for="folder_path">Folder path:</label>
    <input type="text" id="folder_path" name="folder_path">
    <button type="submit">Save folder</button>
</form>

<h2>Files</h2>
<ul>
{% for file in files %}
    <li>{{ file }}</li>
{% endfor %}
</ul>

<h2>Directories</h2>
<ul>
{% for directory in directories %}
    <li>{{ directory }}</li>
{% endfor %}
</ul>
